# Каналы сбора лидов вне тендеров (открытые СМИ, рейтинги, подборки).
# Загрузка: tender-leads open ingest --url "https://..."
#
# Примеры материалов с таблицами «ФИО / должность / компания»:
#   - https://www.kommersant.ru/doc/7180193  (Топ-80 директоров по персоналу)
# Добавляйте свои URL сюда и прогоняйте ingest по расписанию (cron).
# Важно: у закладки должно быть enabled: true, иначе кнопка «все включённые» её пропустит.

bookmarks:
  - url: "https://www.kommersant.ru/doc/7180193"
    note: "Топ HR — Коммерсантъ"
    enabled: true
