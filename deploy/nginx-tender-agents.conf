# /etc/nginx/sites-available/tender-agents
# sudo ln -sf /etc/nginx/sites-available/tender-agents /etc/nginx/sites-enabled/
# Пароль: sudo htpasswd /etc/nginx/.htpasswd-tender-agents USER  (не коммитить в git)
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name 111.88.147.92;

    client_max_body_size 6m;

    auth_basic "FeedBackTalk Tender Leads";
    auth_basic_user_file /etc/nginx/.htpasswd-tender-agents;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
